services:
  database:
    image: postgres:16-alpine
    container_name: bestiarybuilder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bestiarybuilder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bestiarybuilder"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: